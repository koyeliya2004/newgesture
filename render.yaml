services:
  # --- Backend: FastAPI Web Service ---
  - type: web
    name: air-drawing-api
    env: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

  # --- Frontend: Static Site ---
  - type: static
    name: air-drawing-frontend
    region: singapore
    plan: free
    rootDir: frontend
    staticPublishPath: .
    buildCommand: echo 'static'
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
